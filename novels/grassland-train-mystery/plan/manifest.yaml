version: 1
kind: grassland-train-mystery-fiction-plan-manifest
project: grassland-train-mystery
entrypoints:
  overview: README.md
  common: plan/common.md
  workflow: plan/workflow.md
  handoff: plan/handoff.md
execution_rule:
  description: >-
    执行任一创作阶段时，必须同时携带完整通用上下文、当前阶段定位合同与当前执行合同。
    本项目是一部长篇草原列车悬疑小说，所有实施都必须维护封闭空间逻辑、线索公平性与人物动机一致性。
  resolver: scripts/planctl
  state_file: plan/state.yaml
  handoff_file: plan/handoff.md
  repo_instructions:
    - .github/copilot-instructions.md
    - CLAUDE.md
    - AGENTS.md
  continuous_execution:
    next_command: ruby scripts/planctl advance --strict
    completion_command: >-
      ruby scripts/planctl complete <phase-id> --summary "<summary>" --next-focus "<next-focus>" --continue
  continuation:
    mode: autonomous
    stop_only_on:
      - dependency_missing
      - missing_context
      - required_gate_failed
      - git_conflict
      - destructive_operation_required
      - all_phases_completed
    non_stop_actions:
      - phase_completed
      - next_phase_ready
      - placeholder_contract_promotion
      - optional_check_failed
      - no_remote_configured
  enforcement:
    dependency_check: true
    stop_on_missing_context: true
    require_execution_file: true
  enforce_allowed_paths: false
  compression_control:
    enabled: true
    max_completion_history: 3
    resume_read_order:
      - plan/manifest.yaml
      - plan/handoff.md
      - next.phase.required_context
    rules:
      - 永远不要一次性加载所有 phase 文档。
      - 只在当前 phase 读取 plan/common.md、当前 phase plan 和当前 phase execution。
      - 每完成一个 phase 后更新 handoff，再进入下一 phase。
  read_order:
    - plan/common.md
    - phase.plan_file
    - phase.execution_file
  required_context:
    - plan/common.md
phases:
  - id: phase-0-premise-promise
    title: Lock the steppe-train suspense promise
    plan_file: plan/phases/phase-0-premise-promise.md
    execution_file: plan/execution/phase-0-premise-promise.md
    required_context:
      - plan/common.md
      - plan/phases/phase-0-premise-promise.md
      - plan/execution/phase-0-premise-promise.md
    depends_on: []
    allowed_paths:
      - story/premise.md
      - story/canon/foundations.md
      - story/canon/story-promise.md
      - plan/**
  - id: phase-1-cast-engine
    title: Build the suspect cast and relationship engine
    plan_file: plan/phases/phase-1-cast-engine.md
    execution_file: plan/execution/phase-1-cast-engine.md
    required_context:
      - plan/common.md
      - plan/phases/phase-1-cast-engine.md
      - plan/execution/phase-1-cast-engine.md
    depends_on:
      - phase-0-premise-promise
    allowed_paths:
      - story/cast/**
      - story/canon/relationships.md
  - id: phase-2-truth-lattice
    title: Establish the hidden truth and clue lattice
    plan_file: plan/phases/phase-2-truth-lattice.md
    execution_file: plan/execution/phase-2-truth-lattice.md
    required_context:
      - plan/common.md
      - plan/phases/phase-2-truth-lattice.md
      - plan/execution/phase-2-truth-lattice.md
    depends_on:
      - phase-1-cast-engine
    allowed_paths:
      - story/canon/case-file.md
      - story/canon/clue-ledger.md
      - story/canon/timeline.md
  - id: phase-3-route-pressure
    title: Design the route logic and countdown pressure
    plan_file: plan/phases/phase-3-route-pressure.md
    execution_file: plan/execution/phase-3-route-pressure.md
    required_context:
      - plan/common.md
      - plan/phases/phase-3-route-pressure.md
      - plan/execution/phase-3-route-pressure.md
    depends_on:
      - phase-2-truth-lattice
    allowed_paths:
      - story/canon/route-map.md
      - story/canon/train-logic.md
      - story/canon/timeline.md
  - id: phase-4-arc-wave-design
    title: Map the macro arc and suspense waves
    plan_file: plan/phases/phase-4-arc-wave-design.md
    execution_file: plan/execution/phase-4-arc-wave-design.md
    required_context:
      - plan/common.md
      - plan/phases/phase-4-arc-wave-design.md
      - plan/execution/phase-4-arc-wave-design.md
    depends_on:
      - phase-3-route-pressure
    allowed_paths:
      - story/outline/arc-map.md
      - story/outline/tension-waves.md
  - id: phase-5-opening-matrix
    title: Build the opening movement scene matrix
    plan_file: plan/phases/phase-5-opening-matrix.md
    execution_file: plan/execution/phase-5-opening-matrix.md
    required_context:
      - plan/common.md
      - plan/phases/phase-5-opening-matrix.md
      - plan/execution/phase-5-opening-matrix.md
    depends_on:
      - phase-4-arc-wave-design
    allowed_paths:
      - story/outline/part-1-matrix.md
      - story/outline/scene-cards/part-1/**
  - id: phase-6-middle-matrix
    title: Build the middle movement trap matrix
    plan_file: plan/phases/phase-6-middle-matrix.md
    execution_file: plan/execution/phase-6-middle-matrix.md
    required_context:
      - plan/common.md
      - plan/phases/phase-6-middle-matrix.md
      - plan/execution/phase-6-middle-matrix.md
    depends_on:
      - phase-5-opening-matrix
    allowed_paths:
      - story/outline/part-2-matrix.md
      - story/outline/scene-cards/part-2/**
  - id: phase-7-endgame-matrix
    title: Build the endgame convergence matrix
    plan_file: plan/phases/phase-7-endgame-matrix.md
    execution_file: plan/execution/phase-7-endgame-matrix.md
    required_context:
      - plan/common.md
      - plan/phases/phase-7-endgame-matrix.md
      - plan/execution/phase-7-endgame-matrix.md
    depends_on:
      - phase-6-middle-matrix
    allowed_paths:
      - story/outline/part-3-matrix.md
      - story/outline/scene-cards/part-3/**
  - id: phase-8-opening-draft-batch
    title: Draft the opening movement
    plan_file: plan/phases/phase-8-opening-draft-batch.md
    execution_file: plan/execution/phase-8-opening-draft-batch.md
    required_context:
      - plan/common.md
      - plan/phases/phase-8-opening-draft-batch.md
      - plan/execution/phase-8-opening-draft-batch.md
    depends_on:
      - phase-7-endgame-matrix
    allowed_paths:
      - story/draft/part-1/**
  - id: phase-9-middle-draft-batch
    title: Draft the middle movement
    plan_file: plan/phases/phase-9-middle-draft-batch.md
    execution_file: plan/execution/phase-9-middle-draft-batch.md
    required_context:
      - plan/common.md
      - plan/phases/phase-9-middle-draft-batch.md
      - plan/execution/phase-9-middle-draft-batch.md
    depends_on:
      - phase-8-opening-draft-batch
    allowed_paths:
      - story/draft/part-2/**
  - id: phase-10-endgame-draft-batch
    title: Draft the endgame movement
    plan_file: plan/phases/phase-10-endgame-draft-batch.md
    execution_file: plan/execution/phase-10-endgame-draft-batch.md
    required_context:
      - plan/common.md
      - plan/phases/phase-10-endgame-draft-batch.md
      - plan/execution/phase-10-endgame-draft-batch.md
    depends_on:
      - phase-9-middle-draft-batch
    allowed_paths:
      - story/draft/part-3/**
  - id: phase-11-structural-revision
    title: Run the structural suspense revision
    plan_file: plan/phases/phase-11-structural-revision.md
    execution_file: plan/execution/phase-11-structural-revision.md
    required_context:
      - plan/common.md
      - plan/phases/phase-11-structural-revision.md
      - plan/execution/phase-11-structural-revision.md
    depends_on:
      - phase-10-endgame-draft-batch
    allowed_paths:
      - story/draft/**
      - story/revision/**
      - story/canon/clue-ledger.md
      - story/outline/tension-waves.md
      - plan/**