<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Phase-Fiction Workflow mark</title>
  <desc id="desc">A bracketed three-file contract mark with a state flow line ending in a completion checkpoint.</desc>
  <defs>
    <linearGradient id="stateFlow" x1="154" y1="152" x2="414" y2="352" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="0.48" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="40" y="40" width="432" height="432" rx="54" fill="#F8FAFC"/>
  <rect x="40" y="40" width="432" height="432" rx="54" fill="none" stroke="#E2E8F0" stroke-width="4"/>

  <path d="M164 116H116V396H164" fill="none" stroke="#0F172A" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M348 116H396V396H348" fill="none" stroke="#0F172A" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#cardShadow)">
    <rect x="178" y="136" width="156" height="62" rx="14" fill="#ECFDF5" stroke="#10B981" stroke-width="4"/>
    <rect x="178" y="225" width="156" height="62" rx="14" fill="#FFF7ED" stroke="#F59E0B" stroke-width="4"/>
    <rect x="178" y="314" width="156" height="62" rx="14" fill="#ECFEFF" stroke="#06B6D4" stroke-width="4"/>

    <rect x="208" y="160" width="74" height="9" rx="4.5" fill="#065F46" opacity="0.55"/>
    <rect x="208" y="249" width="74" height="9" rx="4.5" fill="#92400E" opacity="0.55"/>
    <rect x="208" y="338" width="74" height="9" rx="4.5" fill="#155E75" opacity="0.55"/>
  </g>

  <path d="M166 167H217C258 167 250 256 287 256H337C376 256 363 345 398 345"
        fill="none" stroke="url(#stateFlow)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="166" cy="167" r="22" fill="#10B981" stroke="#F8FAFC" stroke-width="9"/>
  <circle cx="287" cy="256" r="22" fill="#F59E0B" stroke="#F8FAFC" stroke-width="9"/>
  <circle cx="398" cy="345" r="29" fill="#06B6D4" stroke="#F8FAFC" stroke-width="9"/>
  <path d="M385 345L395 356L414 332" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
