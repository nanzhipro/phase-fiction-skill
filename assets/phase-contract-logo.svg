<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Phase-Fiction Workflow logo</title>
  <desc id="desc">A bracketed three-file contract mark with a state flow line ending in a completion checkpoint, paired with the Phase-Fiction Workflow wordmark.</desc>
  <defs>
    <linearGradient id="stateFlow" x1="80" y1="80" x2="220" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="0.48" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .wordmark {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      }
    </style>
  </defs>

  <g id="logo-mark" transform="translate(40 44)">
    <rect x="8" y="8" width="256" height="256" rx="32" fill="#F8FAFC"/>
    <rect x="8" y="8" width="256" height="256" rx="32" fill="none" stroke="#E2E8F0" stroke-width="2"/>

    <path d="M74 52H48V220H74" fill="none" stroke="#0F172A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M198 52H224V220H198" fill="none" stroke="#0F172A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

    <g filter="url(#cardShadow)">
      <rect x="88" y="62" width="96" height="38" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
      <rect x="88" y="115" width="96" height="38" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
      <rect x="88" y="168" width="96" height="38" rx="8" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2"/>

      <rect x="106" y="76" width="45" height="5" rx="2.5" fill="#065F46" opacity="0.55"/>
      <rect x="106" y="129" width="45" height="5" rx="2.5" fill="#92400E" opacity="0.55"/>
      <rect x="106" y="182" width="45" height="5" rx="2.5" fill="#155E75" opacity="0.55"/>
    </g>

    <path d="M82 81H112C136 81 132 134 154 134H184C207 134 199 187 220 187"
          fill="none" stroke="url(#stateFlow)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="82" cy="81" r="12" fill="#10B981" stroke="#F8FAFC" stroke-width="5"/>
    <circle cx="154" cy="134" r="12" fill="#F59E0B" stroke="#F8FAFC" stroke-width="5"/>
    <circle cx="220" cy="187" r="16" fill="#06B6D4" stroke="#F8FAFC" stroke-width="5"/>
    <path d="M213 187L218 192L228 179" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g class="wordmark" transform="translate(360 0)">
    <text x="0" y="151" fill="#0F172A" font-size="64" font-weight="800">Phase-Fiction</text>
    <text x="3" y="204" fill="#334155" font-size="28" font-weight="650">Workflow</text>
    <g transform="translate(4 230)">
      <rect x="0" y="0" width="58" height="8" rx="4" fill="#10B981"/>
      <rect x="70" y="0" width="58" height="8" rx="4" fill="#F59E0B"/>
      <rect x="140" y="0" width="58" height="8" rx="4" fill="#06B6D4"/>
    </g>
  </g>
</svg>
