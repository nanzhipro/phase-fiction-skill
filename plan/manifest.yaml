version: 1
kind: phase-fiction-skill-plan-manifest
project: phase-fiction-skill
entrypoints:
  overview: README.md
  common: plan/common.md
  workflow: plan/workflow.md
  handoff: plan/handoff.md
execution_rule:
  description: >-
    将当前仓库从面向代码编写与工程交付的长任务 skill，改造成面向长篇小说创作、续写与修订的长任务 skill。
    执行任一 phase 时，必须同时携带通用约束、当前 phase 定位合同与当前 execution 合同。
  resolver: scripts/planctl
  state_file: plan/state.yaml
  handoff_file: plan/handoff.md
  repo_instructions:
    - .github/copilot-instructions.md
    - CLAUDE.md
    - AGENTS.md
  continuous_execution:
    next_command: ruby scripts/planctl advance --strict
    completion_command: >-
      ruby scripts/planctl complete <phase-id> --summary "<summary>" --next-focus "<next-focus>" --continue
  continuation:
    mode: autonomous
    stop_only_on:
      - dependency_missing
      - missing_context
      - required_gate_failed
      - git_conflict
      - destructive_operation_required
      - all_phases_completed
    non_stop_actions:
      - phase_completed
      - next_phase_ready
      - placeholder_contract_promotion
      - optional_check_failed
      - no_remote_configured
  enforcement:
    dependency_check: true
    stop_on_missing_context: true
    require_execution_file: true
  enforce_allowed_paths: false
  compression_control:
    enabled: true
    max_completion_history: 3
    resume_read_order:
      - plan/manifest.yaml
      - plan/handoff.md
      - next.phase.required_context
    rules:
      - 永远不要一次性加载所有 phase 文档。
      - 只在当前 phase 读取 plan/common.md、当前 phase plan 和当前 phase execution。
      - 每完成一个 phase 后更新 handoff，再进入下一 phase。
  read_order:
    - plan/common.md
    - phase.plan_file
    - phase.execution_file
  required_context:
    - plan/common.md
phases:
  - id: phase-0-fiction-reframe
    title: Establish fiction-first positioning scaffold
    plan_file: plan/phases/phase-0-fiction-reframe.md
    execution_file: plan/execution/phase-0-fiction-reframe.md
    required_context:
      - plan/common.md
      - plan/phases/phase-0-fiction-reframe.md
      - plan/execution/phase-0-fiction-reframe.md
    depends_on: []
    allowed_paths:
      - plan/**
      - .github/copilot-instructions.md
      - CLAUDE.md
      - AGENTS.md
      - scripts/planctl
  - id: phase-1-fiction-methodology
    title: Codify novel craft methodology
    plan_file: plan/phases/phase-1-fiction-methodology.md
    execution_file: plan/execution/phase-1-fiction-methodology.md
    required_context:
      - plan/common.md
      - plan/phases/phase-1-fiction-methodology.md
      - plan/execution/phase-1-fiction-methodology.md
    depends_on:
      - phase-0-fiction-reframe
    allowed_paths:
      - references/methodology.md
      - references/glossary.md
  - id: phase-2-fiction-contracts
    title: Rewrite fiction contract templates
    plan_file: plan/phases/phase-2-fiction-contracts.md
    execution_file: plan/execution/phase-2-fiction-contracts.md
    required_context:
      - plan/common.md
      - plan/phases/phase-2-fiction-contracts.md
      - plan/execution/phase-2-fiction-contracts.md
    depends_on:
      - phase-1-fiction-methodology
    allowed_paths:
      - references/templates.md
      - references/phase-templates.md
      - references/agent-instructions-template.md
      - references/workflow-template.md
  - id: phase-3-surface-docs
    title: Rewrite skill discovery and bilingual docs
    plan_file: plan/phases/phase-3-surface-docs.md
    execution_file: plan/execution/phase-3-surface-docs.md
    required_context:
      - plan/common.md
      - plan/phases/phase-3-surface-docs.md
      - plan/execution/phase-3-surface-docs.md
    depends_on:
      - phase-2-fiction-contracts
    allowed_paths:
      - SKILL.md
      - README.md
      - README.zh-CN.md
      - assets/README.md
  - id: phase-4-tooling-and-tests
    title: Align tooling copy and verification
    plan_file: plan/phases/phase-4-tooling-and-tests.md
    execution_file: plan/execution/phase-4-tooling-and-tests.md
    required_context:
      - plan/common.md
      - plan/phases/phase-4-tooling-and-tests.md
      - plan/execution/phase-4-tooling-and-tests.md
    depends_on:
      - phase-3-surface-docs
    allowed_paths:
      - scripts/planctl.rb
      - tests/planctl_autonomous_test.rb
      - CHANGELOG.md
      - TODO.md
      - phase-contract-finalize-patch-brief.md
  - id: phase-5-polish-and-final-review
    title: Final consistency sweep and packaging review
    plan_file: plan/phases/phase-5-polish-and-final-review.md
    execution_file: plan/execution/phase-5-polish-and-final-review.md
    required_context:
      - plan/common.md
      - plan/phases/phase-5-polish-and-final-review.md
      - plan/execution/phase-5-polish-and-final-review.md
    depends_on:
      - phase-4-tooling-and-tests
    allowed_paths:
      - SKILL.md
      - README.md
      - README.zh-CN.md
      - references/**
      - assets/**
      - scripts/planctl.rb
      - tests/planctl_autonomous_test.rb
      - CHANGELOG.md
      - TODO.md
      - phase-contract-finalize-patch-brief.md
      - plan/**
